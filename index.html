<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Mahasiswa Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); }
        .sidebar-item.active { background: #eef2ff; color: #4f46e5; border-right: 3px solid #4f46e5; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden text-slate-800">

    <aside id="sidebar" class="hidden md:flex w-64 bg-white border-r border-slate-200 flex-col justify-between p-6 z-20">
        <div>
            <div class="flex items-center gap-3 mb-10">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white"><i class="ph-fill ph-student"></i></div>
                <h1 class="font-bold text-lg tracking-tight">Student Hub</h1>
            </div>
            <nav class="space-y-2">
                <button onclick="switchView('dashboard')" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-lg font-medium transition-all">
                    <i class="ph ph-squares-four text-xl"></i> Dashboard
                </button>
                <button onclick="switchView('agenda')" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-lg font-medium transition-all">
                    <i class="ph ph-calendar-check text-xl"></i> Agenda
                </button>
                <button onclick="switchView('finance')" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-lg font-medium transition-all">
                    <i class="ph ph-wallet text-xl"></i> Keuangan
                </button>
            </nav>
        </div>
        <button id="btn-logout-side" class="flex items-center gap-3 text-slate-500 hover:text-rose-600 font-medium">
            <i class="ph ph-sign-out text-xl"></i> Keluar
        </button>
    </aside>

    <main class="flex-1 flex flex-col h-full overflow-y-auto bg-slate-50/50 custom-scroll">
        <header class="sticky top-0 z-10 glass border-b border-slate-200 p-6 flex justify-between items-center">
            <h2 id="view-title" class="text-xl font-bold">Dashboard</h2>
            <div class="flex items-center gap-4">
                <div class="hidden md:block text-right">
                    <p class="text-sm font-semibold" id="user-display">Mahasiswa</p>
                </div>
                <button onclick="openAddModal()" class="bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-semibold shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all flex items-center gap-2">
                    <i class="ph ph-plus"></i> Tambah Baru
                </button>
            </div>
        </header>

        <div class="p-6 max-w-7xl mx-auto w-full">
            <!-- Dynamic Content Area -->
            <div id="content-area">
                <!-- Content injected via JS -->
            </div>
        </div>
    </main>

    <!-- Modal Form (Reusable) -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/50 backdrop-blur-sm hidden">
        <div class="bg-white rounded-2xl w-full max-w-lg p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="font-bold text-lg">Tambah Data</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="ph ph-x text-2xl"></i></button>
            </div>
            <!-- Form will be dynamically injected -->
            <div id="form-container"></div>
        </div>
    </div>

    <!-- Auth Section -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-white flex items-center justify-center p-6 hidden">
        <div class="max-w-md w-full bg-slate-50 p-8 rounded-3xl border border-slate-200 shadow-xl">
            <h2 class="text-2xl font-bold mb-1 text-center">Masuk ke Student Hub</h2>
            <p class="text-slate-500 mb-8 text-center text-sm">Kelola masa depanmu dengan teratur.</p>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email" class="w-full p-4 rounded-xl border border-slate-200">
                <input type="password" id="password" placeholder="Password" class="w-full p-4 rounded-xl border border-slate-200">
                <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">Masuk</button>
                <button onclick="handleRegister()" class="w-full text-indigo-600 font-semibold text-sm">Belum punya akun? Daftar</button>
            </div>
        </div>
    </div>

    <script>
        // --- STREAMING_CHUNK:Core Configuration & Auth Logic ---
        const supabaseUrl = 'https://txtjaoszqhzzqfrhztrt.supabase.co';
        const supabaseKey = 'sb_publishable_Mgb1ew5PkLtQXSes3Jakzg_lPmTyk4K';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        let currentView = 'dashboard';

        // --- STREAMING_CHUNK:Initializing View System ---
        const switchView = (view) => {
            currentView = view;
            const content = document.getElementById('content-area');
            const title = document.getElementById('view-title');
            
            // Highlight sidebar
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            
            if (view === 'dashboard') {
                title.textContent = 'Dashboard';
                content.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-indigo-600 text-white p-6 rounded-2xl shadow-lg">
                        <p class="text-indigo-200 text-sm">Saldo Keuangan</p>
                        <h2 class="text-3xl font-bold mt-1">Rp 2.500.000</h2>
                    </div>
                    <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <p class="text-slate-500 text-sm">Tugas Selesai</p>
                        <h2 class="text-3xl font-bold mt-1">12 / 20</h2>
                    </div>
                     <div class="bg-white p-6 rounded-2xl border shadow-sm">
                        <p class="text-slate-500 text-sm">Agenda Minggu Ini</p>
                        <h2 class="text-3xl font-bold mt-1">5 Acara</h2>
                    </div>
                </div>`;
            } else if (view === 'agenda') {
                title.textContent = 'Agenda Kegiatan';
                content.innerHTML = `<div class="bg-white rounded-2xl p-6 border shadow-sm"><p>List Agenda akan muncul di sini...</p></div>`;
            } else if (view === 'finance') {
                title.textContent = 'Keuangan';
                content.innerHTML = `<div class="bg-white rounded-2xl p-6 border shadow-sm"><p>List Transaksi akan muncul di sini...</p></div>`;
            }
        };

        const handleLogin = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert(error.message); else location.reload();
        };

        const handleRegister = async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { error } = await supabaseClient.auth.signUp({ email, password });
            if (error) alert(error.message); else alert("Cek email Anda untuk verifikasi!");
        };

        // --- Auth Check ---
        supabaseClient.auth.getSession().then(({ data }) => {
            if (!data.session) document.getElementById('auth-screen').classList.remove('hidden');
            else switchView('dashboard');
        });

        const openAddModal = () => document.getElementById('modal').classList.remove('hidden');
        const closeModal = () => document.getElementById('modal').classList.add('hidden');
        
        // Start init
        switchView('dashboard');
    </script>
</body>
</html>
