    <!-- Google Fonts: Plus Jakarta Sans -->

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f1f5f9; /* Slate 100 */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Hilangkan scrollbar default untuk tampilan lebih clean di mobile */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-cell { 
            aspect-ratio: 1; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 12px; transition: all 0.3s ease;
            font-weight: 600; font-size: 0.875rem; color: #475569;
        }
        .calendar-cell:active { transform: scale(0.95); }
        .calendar-cell.active { background-color: #4f46e5; color: white; box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3); }
        .calendar-cell.today { border: 2px solid #4f46e5; background-color: #e0e7ff; color: #4338ca; }
        .calendar-cell.today.active { border-color: transparent; }
        
        .dot-container { display: flex; gap: 2px; margin-top: 2px; height: 6px;}
        .dot { width: 4px; height: 4px; border-radius: 50%; }
        
        /* Animasi Modal Bottom Sheet */
        .bottom-sheet { transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .bottom-sheet.open { transform: translateY(0); }
        
        /* Custom Checkbox */
        .custom-checkbox {
            appearance: none; width: 24px; height: 24px; border: 2px solid #cbd5e1;
            border-radius: 6px; outline: none; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; background-color: white;
            flex-shrink: 0;
        }
        .custom-checkbox:checked { background-color: #4f46e5; border-color: #4f46e5; }
        .custom-checkbox:checked::after {
            content: '✓'; color: white; font-weight: bold; font-size: 14px;
        }

        /* Glassmorphism Navigation */
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-top: 1px solid rgba(255,255,255,0.3); }
        
        .nav-item { transition: all 0.3s; }
        .nav-item.active { color: #4f46e5; }
        .nav-item.inactive { color: #94a3b8; }
        
        /* Menghindari tertutup keyboard di iOS */
        input, select { font-size: 16px !important; }
    </style>
</head>

    <script>
        // --- 1. INISIALISASI SUPABASE ---
        const supabaseUrl = 'https://txtjaoszqhzzqfrhztrt.supabase.co';
        const supabaseKey = 'sb_publishable_Mgb1ew5PkLtQXSes3Jakzg_lPmTyk4K';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // --- 2. STATE APLIKASI ---
        let financialTasks = [];
        let agendaTasks = [];
        let currentTab = 'agenda'; // Default tab
        let currentModalForm = 'agenda'; 
        
        let currentDate = new Date(); 
        let selectedFilterDate = null; 
        let searchQuery = '';

        // --- 3. DOM ELEMENTS ---
        const loadingState = document.getElementById('loading');
        const authScreen = document.getElementById('auth-screen');
        const appDashboard = document.getElementById('app-dashboard');
        const tabContent = document.getElementById('tab-content');
        
        // Navigation
        const navAgenda = document.getElementById('nav-agenda');
        const navFinance = document.getElementById('nav-finance');
        const iconAgenda = document.getElementById('icon-agenda');
        const iconFinance = document.getElementById('icon-finance');
        
        // Modal & Form
        const modalOverlay = document.getElementById('modal-overlay');
        const addModal = document.getElementById('add-modal');
        const formAgenda = document.getElementById('form-agenda');
        const formFinance = document.getElementById('form-finance');
        const toggleAgendaBtn = document.getElementById('toggle-add-agenda');
        const toggleFinanceBtn = document.getElementById('toggle-add-finance');

        // Header Date
        const optionsHeader = { weekday: 'long', day: 'numeric', month: 'long' };
        document.getElementById('header-date').textContent = new Date().toLocaleDateString('id-ID', optionsHeader);

        // --- 4. FUNGSI UTILITAS ---
        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        const formatDate = (dateStr) => {
            const date = new Date(dateStr);
            const today = new Date();
            const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
            
            if (date.toDateString() === today.toDateString()) return "Hari ini";
            if (date.toDateString() === tomorrow.toDateString()) return "Besok";
            return date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
        };

        const showToast = (message, type = 'success') => {
            const toastEl = document.getElementById('toast');
            const iconEl = document.getElementById('toast-icon');
            document.getElementById('toast-message').textContent = message;
            
            if (type === 'success') {
                toastEl.className = "fixed top-6 left-1/2 -translate-x-1/2 transform transition-all duration-300 z-[100] flex items-center gap-2 px-5 py-3 rounded-full shadow-lg text-white font-semibold text-sm bg-emerald-500 translate-y-0";
                iconEl.className = "ph-fill ph-check-circle text-lg";
            } else {
                toastEl.className = "fixed top-6 left-1/2 -translate-x-1/2 transform transition-all duration-300 z-[100] flex items-center gap-2 px-5 py-3 rounded-full shadow-lg text-white font-semibold text-sm bg-rose-500 translate-y-0";
                iconEl.className = "ph-fill ph-warning-circle text-lg";
            }
            
            setTimeout(() => {
                toastEl.classList.remove('translate-y-0');
                toastEl.classList.add('-translate-y-24');
            }, 3000);
        };

        const showLoading = (show) => {
            if (show) { loadingState.classList.remove('hidden'); } 
            else { loadingState.classList.add('hidden'); }
        };

        // --- 5. LOGIKA TAB NAVIGATION (BOTTOM NAV) ---
        window.switchTab = (tab) => {
            currentTab = tab;
            
            // Reset styles
            navAgenda.className = "nav-item inactive flex flex-col items-center p-2 w-16";
            navFinance.className = "nav-item inactive flex flex-col items-center p-2 w-16";
            iconAgenda.className = "ph ph-list-checks text-2xl mb-1 transition-all";
            iconFinance.className = "ph ph-wallet text-2xl mb-1 transition-all";

            // Set active styles
            if (tab === 'agenda') {
                navAgenda.classList.replace('inactive', 'active');
                iconAgenda.classList.replace('ph', 'ph-fill');
            } else {
                navFinance.classList.replace('inactive', 'active');
                iconFinance.classList.replace('ph', 'ph-fill');
            }
            
            renderMainContent();
        };

        // --- 6. LOGIKA MODAL (BOTTOM SHEET) ---
        const openModal = () => {
            modalOverlay.classList.remove('hidden');
            setTimeout(() => {
                modalOverlay.classList.remove('opacity-0');
                addModal.classList.add('open');
            }, 10);
            
            // Sesuaikan isi modal berdasarkan tab yang sedang aktif
            switchModalForm(currentTab);
        };

        const closeModal = () => {
            addModal.classList.remove('open');
            modalOverlay.classList.add('opacity-0');
            setTimeout(() => modalOverlay.classList.add('hidden'), 300);
        };

        const switchModalForm = (type) => {
            currentModalForm = type;
            if(type === 'agenda') {
                formAgenda.classList.remove('hidden'); formFinance.classList.add('hidden');
                toggleAgendaBtn.className = "flex-1 py-2.5 rounded-lg text-sm font-bold bg-white text-indigo-600 shadow-sm transition-all";
                toggleFinanceBtn.className = "flex-1 py-2.5 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
                document.getElementById('modal-title').textContent = "Tambah Agenda";
            } else {
                formFinance.classList.remove('hidden'); formAgenda.classList.add('hidden');
                toggleFinanceBtn.className = "flex-1 py-2.5 rounded-lg text-sm font-bold bg-white text-emerald-600 shadow-sm transition-all";
                toggleAgendaBtn.className = "flex-1 py-2.5 rounded-lg text-sm font-bold text-slate-500 hover:text-slate-700 transition-all";
                document.getElementById('modal-title').textContent = "Catat Transaksi";
            }
        };

        document.getElementById('btn-open-modal').addEventListener('click', openModal);
        document.getElementById('btn-close-modal').addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', closeModal);
        toggleAgendaBtn.addEventListener('click', () => switchModalForm('agenda'));
        toggleFinanceBtn.addEventListener('click', () => switchModalForm('finance'));

        // --- 7. FETCH & RENDER DATA ---
        const fetchData = async () => {
            showLoading(true);
            try {
                const { data: finData } = await supabaseClient.from('financial_tasks').select('*').order('due_date', { ascending: true });
                const { data: agData } = await supabaseClient.from('daily_tasks').select('*').order('due_date', { ascending: true });
                
                financialTasks = finData || [];
                agendaTasks = agData || [];

                renderCalendar();
                renderMainContent();
            } catch (error) {
                console.error("Error fetching:", error);
            } finally {
                showLoading(false);
            }
        };

        // Render Kalender (Logic sama, styling disempurnakan)
        const renderCalendar = () => {
            const calendarBody = document.getElementById('calendar-body');
            calendarBody.innerHTML = '';
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const today = new Date();
            const monthNames = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            
            document.getElementById('current-month-year').textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            for (let i = 0; i < firstDay; i++) { calendarBody.innerHTML += `<div></div>`; }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const cell = document.createElement('div');
                cell.className = 'calendar-cell';
                
                if (day === today.getDate() && month === today.getMonth() && year === today.getFullYear()) cell.classList.add('today');
                if (selectedFilterDate === dateStr) cell.classList.add('active');

                let dotsHtml = '<div class="dot-container">';
                if (financialTasks.some(t => t.due_date === dateStr && t.type === 'income')) dotsHtml += `<div class="dot bg-emerald-400"></div>`;
                if (financialTasks.some(t => t.due_date === dateStr && t.type === 'expense')) dotsHtml += `<div class="dot bg-rose-400"></div>`;
                if (agendaTasks.some(t => t.due_date === dateStr)) dotsHtml += `<div class="dot bg-indigo-400"></div>`;
                dotsHtml += '</div>';

                cell.innerHTML = `<span>${day}</span>${dotsHtml}`;
                
                cell.addEventListener('click', () => {
                    selectedFilterDate = selectedFilterDate === dateStr ? null : dateStr;
                    renderCalendar();
                    renderMainContent();
                });

                calendarBody.appendChild(cell);
            }

            const filterInfo = document.getElementById('filter-info');
            if (selectedFilterDate) {
                filterInfo.classList.remove('hidden');
                document.getElementById('filter-text').textContent = `Tugas tgl: ${formatDate(selectedFilterDate)}`;
            } else {
                filterInfo.classList.add('hidden');
            }
        };

        // --- 8. DINAMIS RENDER KONTEN TAB UTAMA ---
        const renderMainContent = () => {
            tabContent.innerHTML = ''; // Kosongkan
            
            if (currentTab === 'agenda') {
                renderAgendaView();
            } else {
                renderFinanceView();
            }
        };

        const renderAgendaView = () => {
            // Kalkulasi Progress
            const total = agendaTasks.length;
            const completed = agendaTasks.filter(t => t.is_completed).length;
            const percentage = total === 0 ? 0 : Math.round((completed / total) * 100);
            
            // Build UI
            let html = `
                <div class="mb-5 bg-white p-5 rounded-[24px] shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="w-14 h-14 rounded-full flex items-center justify-center relative ${percentage === 100 && total > 0 ? 'bg-emerald-100 text-emerald-600' : 'bg-indigo-50 text-indigo-600'}">
                        <svg viewBox="0 0 36 36" class="w-full h-full transform -rotate-90">
                            <path class="text-slate-100" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="transition-all duration-700 ease-out" stroke-dasharray="${percentage}, 100" stroke-width="3" stroke="currentColor" fill="none" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        </svg>
                        <span class="absolute text-[10px] font-bold">${percentage}%</span>
                    </div>
                    <div>
                        <h3 class="font-extrabold text-slate-800 text-base">Progres Hari Ini</h3>
                        <p class="text-slate-500 text-sm font-medium">${completed} dari ${total} tugas selesai</p>
                    </div>
                </div>
                <div class="flex justify-between items-end mb-3 px-1">
                    <h3 class="font-extrabold text-slate-800 text-lg">Daftar Agenda</h3>
                </div>
                <div class="space-y-3" id="agenda-list-container"></div>
            `;
            tabContent.innerHTML = html;
            
            // Filter Data
            let filtered = agendaTasks.filter(task => {
                const matchDate = selectedFilterDate ? task.due_date === selectedFilterDate : true;
                const matchSearch = task.title.toLowerCase().includes(searchQuery) || task.category.toLowerCase().includes(searchQuery);
                return matchDate && matchSearch;
            });

            const container = document.getElementById('agenda-list-container');
            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 bg-slate-50 rounded-[24px] border border-dashed border-slate-200"><i class="ph-duotone ph-list-magnifying-glass text-4xl text-slate-300 mb-2"></i><p class="text-slate-500 font-medium text-sm">Belum ada agenda di sini.</p></div>`;
                return;
            }

            filtered.forEach(task => {
                const isLate = !task.is_completed && new Date(task.due_date) < new Date(new Date().setHours(0,0,0,0));
                
                let iconClass = "ph-book-open text-blue-500 bg-blue-50";
                if(task.category === 'Organisasi') iconClass = "ph-users text-amber-500 bg-amber-50";
                if(task.category === 'Pribadi') iconClass = "ph-house text-purple-500 bg-purple-50";

                const div = document.createElement('div');
                div.className = `p-4 rounded-[20px] flex gap-4 items-start transition-all ${task.is_completed ? 'opacity-60 bg-slate-50 border border-slate-100 grayscale-[0.5]' : 'bg-white shadow-sm border border-slate-100 hover:shadow-md'}`;
                
                div.innerHTML = `
                    <div class="pt-1">
                        <input type="checkbox" ${task.is_completed ? 'checked' : ''} onchange="toggleComplete('${task.id}', ${task.is_completed}, 'daily_tasks')" class="custom-checkbox">
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="inline-flex w-6 h-6 items-center justify-center rounded-md ${iconClass}"><i class="ph-fill ${iconClass.split(' ')[0]} text-xs"></i></span>
                            <span class="text-[10px] font-extrabold uppercase tracking-wider text-slate-400">${task.category}</span>
                            ${task.priority === 'Tinggi' ? '<span class="ml-auto w-2 h-2 rounded-full bg-rose-500 animate-pulse"></span>' : ''}
                        </div>
                        <h4 class="font-bold text-[15px] leading-tight mb-1 ${task.is_completed ? 'line-through text-slate-400' : 'text-slate-800 truncate'}">${task.title}</h4>
                        ${task.description && !task.is_completed ? `<p class="text-xs text-slate-500 mb-2 line-clamp-2">${task.description}</p>` : ''}
                        <div class="flex items-center justify-between mt-2">
                            <div class="flex items-center gap-1.5 text-xs font-semibold ${isLate ? 'text-rose-500' : 'text-slate-400'}">
                                <i class="ph-bold ${isLate ? 'ph-warning-circle' : 'ph-calendar-blank'}"></i>
                                <span>${formatDate(task.due_date)} ${isLate ? '(Lewat)' : ''}</span>
                            </div>
                            <button onclick="deleteTask('${task.id}', 'daily_tasks')" class="text-slate-300 hover:text-rose-500 transition-colors"><i class="ph-fill ph-trash text-lg"></i></button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        const renderFinanceView = () => {
            let income = 0, expense = 0;
            financialTasks.forEach(task => {
                if (!task.is_completed) {
                    if (task.type === 'income') income += Number(task.amount);
                    if (task.type === 'expense') expense += Number(task.amount);
                }
            });
            const balance = income - expense;

            let html = `
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="col-span-2 bg-gradient-to-r from-slate-800 to-slate-900 rounded-[24px] p-5 text-white shadow-lg shadow-slate-200 flex justify-between items-center">
                        <div>
                            <p class="text-xs font-semibold text-slate-300 mb-1 tracking-wide uppercase">Estimasi Sisa Saldo</p>
                            <p class="text-2xl font-extrabold tracking-tight">${formatRupiah(balance)}</p>
                        </div>
                        <div class="w-12 h-12 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center">
                            <i class="ph-duotone ph-wallet text-2xl text-white"></i>
                        </div>
                    </div>
                    <div class="bg-emerald-50 rounded-[20px] p-4 border border-emerald-100">
                        <div class="flex items-center gap-1.5 text-emerald-600 mb-1">
                            <i class="ph-bold ph-trend-up"></i><p class="text-xs font-bold uppercase tracking-wider">Masuk</p>
                        </div>
                        <p class="text-sm font-extrabold text-emerald-700">${formatRupiah(income)}</p>
                    </div>
                    <div class="bg-rose-50 rounded-[20px] p-4 border border-rose-100">
                        <div class="flex items-center gap-1.5 text-rose-600 mb-1">
                            <i class="ph-bold ph-trend-down"></i><p class="text-xs font-bold uppercase tracking-wider">Keluar</p>
                        </div>
                        <p class="text-sm font-extrabold text-rose-700">${formatRupiah(expense)}</p>
                    </div>
                </div>
                <div class="flex justify-between items-end mb-3 px-1">
                    <h3 class="font-extrabold text-slate-800 text-lg">Riwayat & Rencana</h3>
                </div>
                <div class="space-y-3" id="finance-list-container"></div>
            `;
            tabContent.innerHTML = html;

            let filtered = financialTasks.filter(task => {
                const matchDate = selectedFilterDate ? task.due_date === selectedFilterDate : true;
                const matchSearch = task.title.toLowerCase().includes(searchQuery) || task.category.toLowerCase().includes(searchQuery);
                return matchDate && matchSearch;
            });

            const container = document.getElementById('finance-list-container');
            if (filtered.length === 0) {
                container.innerHTML = `<div class="text-center py-10 bg-slate-50 rounded-[24px] border border-dashed border-slate-200"><i class="ph-duotone ph-receipt text-4xl text-slate-300 mb-2"></i><p class="text-slate-500 font-medium text-sm">Belum ada catatan keuangan.</p></div>`;
                return;
            }

            filtered.forEach(task => {
                const isIncome = task.type === 'income';
                
                let iconMap = {
                    "Makan & Minum": { icon: "ph-hamburger", color: "text-orange-500 bg-orange-50" },
                    "Kos/Tempat Tinggal": { icon: "ph-house-line", color: "text-indigo-500 bg-indigo-50" },
                    "Transportasi": { icon: "ph-car", color: "text-sky-500 bg-sky-50" },
                    "Tugas Kuliah": { icon: "ph-books", color: "text-purple-500 bg-purple-50" },
                    "Lainnya": { icon: "ph-dots-three-circle", color: "text-slate-500 bg-slate-100" }
                };
                let style = iconMap[task.category] || iconMap["Lainnya"];

                const div = document.createElement('div');
                div.className = `p-4 rounded-[20px] flex gap-3 items-center transition-all ${task.is_completed ? 'opacity-60 bg-slate-50 border border-slate-100' : 'bg-white shadow-sm border border-slate-100 hover:shadow-md'}`;
                
                div.innerHTML = `
                    <input type="checkbox" ${task.is_completed ? 'checked' : ''} onchange="toggleComplete('${task.id}', ${task.is_completed}, 'financial_tasks')" class="custom-checkbox">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${style.color}">
                        <i class="ph-fill ${style.icon} text-lg"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-bold text-[14px] leading-tight text-slate-800 truncate ${task.is_completed ? 'line-through text-slate-400' : ''}">${task.title}</h4>
                        <p class="text-[11px] font-bold text-slate-400 mt-0.5">${formatDate(task.due_date)} • ${task.category}</p>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <span class="text-[14px] font-extrabold ${isIncome ? 'text-emerald-500' : 'text-rose-500'}">
                            ${isIncome ? '+' : '-'}${formatRupiah(task.amount)}
                        </span>
                        <button onclick="deleteTask('${task.id}', 'financial_tasks')" class="text-slate-300 hover:text-rose-500 mt-1 p-1"><i class="ph-fill ph-trash"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        };

        // --- 9. OPERASI DATABASE ---
        formAgenda.addEventListener('submit', async (e) => {
            e.preventDefault();
            showLoading(true);
            const { error } = await supabaseClient.from('daily_tasks').insert([{
                title: document.getElementById('ag-title').value,
                description: document.getElementById('ag-desc').value,
                priority: document.getElementById('ag-priority').value,
                category: document.getElementById('ag-category').value,
                due_date: document.getElementById('ag-date').value
            }]);
            showLoading(false);
            if (!error) { formAgenda.reset(); closeModal(); showToast('Agenda tersimpan!'); fetchData(); }
            else { showToast('Gagal menyimpan agenda.', 'error'); }
        });

        formFinance.addEventListener('submit', async (e) => {
            e.preventDefault();
            showLoading(true);
            const { error } = await supabaseClient.from('financial_tasks').insert([{
                title: document.getElementById('fin-title').value,
                amount: document.getElementById('fin-amount').value,
                type: document.getElementById('fin-type').value,
                category: document.getElementById('fin-category').value,
                due_date: document.getElementById('fin-date').value
            }]);
            showLoading(false);
            if (!error) { formFinance.reset(); closeModal(); showToast('Transaksi tersimpan!'); fetchData(); }
            else { showToast('Gagal menyimpan transaksi.', 'error'); }
        });

        window.toggleComplete = async (id, currentStatus, table) => {
            const { error } = await supabaseClient.from(table).update({ is_completed: !currentStatus }).eq('id', id);
            if (!error) fetchData();
            else showToast('Gagal update status.', 'error');
        };

        window.deleteTask = async (id, table) => {
            if(!confirm('Hapus item ini secara permanen?')) return;
            const { error } = await supabaseClient.from(table).delete().eq('id', id);
            if (!error) { showToast('Terhapus.'); fetchData(); }
            else showToast('Gagal menghapus.', 'error');
        };

        // --- 10. EVENT LISTENERS LAIN & AUTH ---
        document.getElementById('prev-month').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); });
        document.getElementById('next-month').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); });
        document.getElementById('clear-filter').addEventListener('click', () => { selectedFilterDate = null; renderCalendar(); renderMainContent(); });
        document.getElementById('search-input').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); renderMainContent(); });

        // Auth Logic
        supabaseClient.auth.onAuthStateChange((event, session) => {
            if (session) {
                authScreen.classList.add('hidden'); appDashboard.classList.remove('hidden');
                fetchData();
            } else {
                authScreen.classList.remove('hidden'); appDashboard.classList.add('hidden');
                showLoading(false);
            }
        });

        document.getElementById('btn-register').addEventListener('click', async () => {
            const e = document.getElementById('auth-email').value; const p = document.getElementById('auth-password').value;
            if (!e || !p) return showToast('Isi email & sandi!', 'error');
            showLoading(true);
            const { error } = await supabaseClient.auth.signUp({ email: e, password: p });
            showLoading(false);
            if (error) showToast(error.message, 'error'); else showToast('Daftar berhasil! Silakan masuk.');
        });

        document.getElementById('btn-login').addEventListener('click', async () => {
            const e = document.getElementById('auth-email').value; const p = document.getElementById('auth-password').value;
            if (!e || !p) return showToast('Isi email & sandi!', 'error');
            showLoading(true);
            const { error } = await supabaseClient.auth.signInWithPassword({ email: e, password: p });
            showLoading(false);
            if (error) showToast('Email/Sandi salah.', 'error');
        });

        document.getElementById('btn-logout').addEventListener('click', async () => {
            showLoading(true); await supabaseClient.auth.signOut(); showLoading(false);
        });

    </script>
</body>
</html>
